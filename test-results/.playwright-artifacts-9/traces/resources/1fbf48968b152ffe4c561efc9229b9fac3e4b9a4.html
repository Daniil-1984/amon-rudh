<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Relax Gaming APEX</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      color: #eee;
      text-align: center;
    }

    #vroot {
      position: fixed;
      display: flex;
      flex-direction: column-reverse;
      border: 0;

      width: 100%;
      height: 100%;
      height: 100dvh;
    }

    #hroot {
      display: flex;
      flex-direction: row-reverse;
      flex-grow: 1;

      height: 100%;
      overflow: hidden;
    }

    #game-wrapper {
      position: relative;
      flex-grow: 1;
    }

    #game, .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .overlay {
      pointer-events: none;
    }

    #game {
      display: block;
      border: 0;
      outline: none;
      margin: 0;
      padding: 0;

      /* The combo of inadequate base height + real size as minHeight is required for old iOS iFrame content sizing (at least iOS 12) */
      height: 1px;
      min-height: 100%;
    }

    #minimal-ui-treadmill {
      position: relative;
      visibility: hidden;
      width: 100%;
      height: 999999vh;
    }

  </style>
<script defer src="nexus.min.js"></script></head>

<body>
  <div id="vroot">
    <div id="hroot">
      <div id="game-wrapper">
        <iframe id="game" scrolling="no"></iframe>
        <div id="overlay" class="overlay"></div>
      </div>
    </div>
  </div>
  <div id="minimal-ui-treadmill"></div>
</body>
</html>
